<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolha as Casas — Legacy of Magic</title>
  <link rel="stylesheet" href="../css/style.css">
   <link rel="shortcut icon" href="../img/img_favicon.png" type="image/x-icon">
  <script src="../js/selecaoDuelo.js" defer></script>
</head>

<body>
  <div id="fundo-magico" aria-hidden="true">
    <div class="estrelas"></div>
    <div class="estrelas estrelas--2"></div>
    <div class="vinhetas"></div>
  </div>

  <main class="pagina-cartela">
    <div class="cartela cartela--larga">
      <p class="eyebrow">Modo Duelo</p>
      <h2>Duelo — Escolha as Casas</h2>
      <div class="linha-sigilo" aria-hidden="true"></div>

      <div class="selecao-duelo-colunas">
        <div>
          <h3>Jogador 1 <span class="dica-tecla">(W/S · 1 2 3)</span></h3>
          <div class="grade-casas" id="grade-casas-p1">
            <button type="button" class="casa-btn" data-casa="grifinoria" style="--cor-casa:#740001">🦁
              Grifinória</button>
            <button type="button" class="casa-btn" data-casa="sonserina" style="--cor-casa:#1a472a">🐍
              Sonserina</button>
            <button type="button" class="casa-btn" data-casa="lufalufa" style="--cor-casa:#ecb939">🦡 Lufa-Lufa</button>
          </div>
        </div>
        <div class="divisoria-vs" aria-hidden="true">VS</div>
        <div>
          <h3>Jogador 2 <span class="dica-tecla">(↑/↓ · J K L)</span></h3>
          <div class="grade-casas" id="grade-casas-p2">
            <button type="button" class="casa-btn" data-casa="grifinoria" style="--cor-casa:#740001">🦁
              Grifinória</button>
            <button type="button" class="casa-btn" data-casa="sonserina" style="--cor-casa:#1a472a">🐍
              Sonserina</button>

            <button type="button" class="casa-btn" data-casa="lufalufa" style="--cor-casa:#ecb939">🦡 Lufa-Lufa</button>


          </div>
        </div>

        <div class="menu-botoes menu-botoes--linha">
          <a id="btn-iniciar-duelo" class="botao botao--principal desabilitado" href="#">Iniciar Duelo</a>
          <a href="../index.html" class="botao botao--fantasma">← Voltar</a>
        </div>
      </div>
  </main>



</body>

</html>
