<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fim de Duelo — Legacy of Magic</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="fundo-magico" aria-hidden="true">
    <div class="estrelas"></div>
    <div class="estrelas estrelas--2"></div>
    <div class="vinhetas"></div>
  </div>

  <main class="pagina-cartela">
    <div class="cartela">
      <h1 id="titulo-fim-duelo">Fim de Duelo</h1>
      <div class="menu-botoes">
        <a id="btn-revanche" class="botao botao--principal" href="/html/duelo.html">Revanche</a>
        <a href="/html/index.html" class="botao botao--fantasma">Menu Principal</a>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const p1 = params.get("p1");
    const p2 = params.get("p2");
    const vencedor = params.get("vencedor");
    
    if (vencedor) {
      document.getElementById("titulo-fim-duelo").textContent = `🏆 ${vencedor} venceu o duelo!`;
    }
    if (p1 && p2) {
      // Corrigido para apontar para o arquivo correto dueloJogo.html dentro da pasta /html/
      document.getElementById("btn-revanche").href = `/html/dueloJogo.html?p1=${p1}&p2=${p2}`;
    }
  </script>
</body>
</html>
