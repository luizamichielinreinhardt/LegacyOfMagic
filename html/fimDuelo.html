<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fim de Duelo — Legacy of Magic</title>
  <link rel="stylesheet" href="../css/style.css">
   <link rel="shortcut icon" href="../img/img_favicon.png" type="image/x-icon">
</head>
<body>
  <div id="fundo-magico" aria-hidden="true">
    <div class="estrelas"></div>
    <div class="estrelas estrelas--2"></div>
    <div class="vinhetas"></div>
  </div>

  <main class="pagina-cartela">
    <div class="cartela">
      <h1 id="titulo-fim-duelo">Fim de Duelo</h1>
      <div id="sprites-duelo-final" class="sprites-duelo-final" style="display:none;">
        <img id="sprite-p1" alt="">
        <img id="sprite-p2" alt="">
      </div>
      <div class="menu-botoes">
        <a id="btn-revanche" class="botao botao--principal" href="./duelo.html">Revanche</a>
        <a href="../index.html" class="botao botao--fantasma">Menu Principal</a>
      </div>
    </div>
  </main>
  <script>
    const PERSONAGEM_CASA = { grifinoria: 'julia', sonserina: 'luiza', lufalufa: 'evelin' };
    const NOME_CASA = { grifinoria: "Grifinória", sonserina: "Sonserina", lufalufa: "Lufa-Lufa", corvinal: "Corvinal" };

    const params = new URLSearchParams(window.location.search);
    const p1 = params.get("p1");
    const p2 = params.get("p2");
    const vencedor = params.get("vencedor");
    
    if (vencedor) {
      document.getElementById("titulo-fim-duelo").textContent = `🏆 ${vencedor} venceu o duelo!`;
    }
    if (p1 && p2) {
      document.getElementById("btn-revanche").href = `./dueloJogo.html?p1=${p1}&p2=${p2}`;

      const personagem1 = PERSONAGEM_CASA[p1];
      const personagem2 = PERSONAGEM_CASA[p2];
      if (personagem1 && personagem2) {
        const p1Venceu = vencedor === NOME_CASA[p1];
        const p2Venceu = vencedor === NOME_CASA[p2];

        const spriteP1 = document.getElementById("sprite-p1");
        spriteP1.src = `../img/sprite_${p1Venceu ? 'vitoria' : 'derrot'}_${personagem1}.png`;
        spriteP1.alt = `${personagem1} (P1)`;
        spriteP1.className = p1Venceu ? 'vencedor' : (p2Venceu ? 'perdedor' : '');

        const spriteP2 = document.getElementById("sprite-p2");
        spriteP2.src = `../img/sprite_${p2Venceu ? 'vitoria' : 'derrot'}_${personagem2}.png`;
        spriteP2.alt = `${personagem2} (P2)`;
        spriteP2.className = p2Venceu ? 'vencedor' : (p1Venceu ? 'perdedor' : '');

        document.getElementById("sprites-duelo-final").style.display = "flex";
      }
    }
  </script>
</body>
</html>
