<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitória! — Legacy of Magic</title>
<link rel="shortcut icon" href="./imagens/img_favicon.png" type="image/x-icon">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="fundo-magico" aria-hidden="true">
    <div class="estrelas"></div>
    <div class="estrelas estrelas--2"></div>
    <div class="vinhetas"></div>
  </div>

  <main class="pagina-cartela">
    <div class="cartela">
      <h1>🏆 Vitória!</h1>
      <p>Parabéns! Você concluiu o treinamento dos bruxos e protegeu Hogwarts!</p>
      <p id="pontos-finais"></p>
      <div class="menu-botoes">
        <a id="btn-jogar-de-novo" class="botao botao--principal" href="1player.html">Jogar novamente</a>
        <a href="index.html" class="botao botao--fantasma">Menu Principal</a>
      </div>
    </div>
  </main>

  <script>
    // Lê a casa da URL (?casa=...) pra permitir "jogar novamente" com a mesma casa
    const params = new URLSearchParams(window.location.search);
    const casa = params.get("casa");
    const pontos = params.get("pontos");
    if (casa) document.getElementById("btn-jogar-de-novo").href = `jogo.html?casa=${casa}`;
    if (pontos) document.getElementById("pontos-finais").textContent = `Pontuação: ${pontos}`;
  </script>
</body>
</html>
